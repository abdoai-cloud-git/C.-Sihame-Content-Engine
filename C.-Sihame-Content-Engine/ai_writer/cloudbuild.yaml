steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - C.-Sihame-Content-Engine/ai_writer/backend/Dockerfile
      - -t
      - gcr.io/$PROJECT_ID/ai-content-engine-backend:$COMMIT_SHA
      - C.-Sihame-Content-Engine/ai_writer

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/ai-content-engine-backend:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - gcr.io/$PROJECT_ID/ai-content-engine-backend:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      - --timeout
      - ${_TIMEOUT}

images:
  - gcr.io/$PROJECT_ID/ai-content-engine-backend:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _SERVICE_NAME: sihame-backend-dev
  _REGION: europe-west1
  _TIMEOUT: 900s
