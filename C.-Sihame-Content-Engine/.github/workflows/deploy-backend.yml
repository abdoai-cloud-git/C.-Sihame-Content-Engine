name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'ai_writer/backend/**'
      - 'ai_writer/Dockerfile'
      - 'knowledge_pack/**'
      - 'feedback_log.md'

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: c-sihame-atamnia
      REGION: europe-west1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine service name
        id: vars
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "SERVICE=c--sihame-content-engine" >> $GITHUB_OUTPUT
            echo "CORS=${{ secrets.CORS_ORIGINS_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "SERVICE=sihame-backend-dev" >> $GITHUB_OUTPUT
            echo "CORS=${{ secrets.CORS_ORIGINS_DEV }}" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (from source)
        run: |
          gcloud run deploy ${{ steps.vars.outputs.SERVICE }} \
            --source ai_writer/ \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars="KIE_API_KEY=${{ secrets.KIE_API_KEY }},SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }},SUPABASE_DRAFTS_TABLE=drafts,STORAGE_BACKEND=supabase,CORS_ORIGINS=${{ steps.vars.outputs.CORS }}"
