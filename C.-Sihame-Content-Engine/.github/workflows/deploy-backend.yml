name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'ai_writer/backend/**'
      - 'ai_writer/Dockerfile'
      - 'knowledge_pack/**'
      - 'feedback_log.md'
      - 'c.siham-designer-main/**'
      - '.github/workflows/**'
  workflow_dispatch:   # ← allows manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: c-sihame-atamnia
      REGION: europe-west1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine service name and CORS
        id: vars
        env:
          CORS_PROD: ${{ secrets.CORS_ORIGINS_PROD }}
          CORS_DEV: ${{ secrets.CORS_ORIGINS_DEV }}
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "SERVICE=c--sihame-content-engine" >> $GITHUB_OUTPUT
            echo "CORS=$CORS_PROD" >> $GITHUB_OUTPUT
          else
            echo "SERVICE=sihame-backend-dev" >> $GITHUB_OUTPUT
            echo "CORS=$CORS_DEV" >> $GITHUB_OUTPUT
          fi
          echo "Branch: ${{ github.ref_name }} → service: $(cat $GITHUB_OUTPUT | grep SERVICE | cut -d= -f2)"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (from source)
        run: |
          gcloud run deploy ${{ steps.vars.outputs.SERVICE }} \
            --source ai_writer/ \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars="KIE_API_KEY=${{ secrets.KIE_API_KEY }},SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }},SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }},SUPABASE_DRAFTS_TABLE=drafts,STORAGE_BACKEND=supabase,CORS_ORIGINS=${{ steps.vars.outputs.CORS }}"
          echo "✅ Deployed ${{ steps.vars.outputs.SERVICE }} successfully."
